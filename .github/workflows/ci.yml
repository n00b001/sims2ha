name: CI

# Quality gate for every push and pull request to main:
#   - manifest.json / hacs.json are valid JSON
#   - the Python integration compiles
#   - the source JS (cards + icons) and the built bundle parse
#   - hassfest (Home Assistant's integration validator) passes
#   - HACS validates the repository for the "integration" category

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lint and validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate manifest.json and hacs.json
        run: |
          python -c "import json; json.load(open('custom_components/sims2ha/manifest.json'))"
          python -c "import json; json.load(open('hacs.json'))"

      - name: Compile Python (integration)
        run: python -m py_compile custom_components/sims2ha/*.py

      - name: Check JavaScript syntax
        run: |
          for f in src/*.js; do node --check "$f"; done
          node --check custom_components/sims2ha/frontend/sims2-bundle.js

      - name: Lint JavaScript
        run: npm run lint

      - name: Lint Python
        run: uv run ruff check .

      - name: Run Python tests
        run: uv run pytest

      - name: Run JavaScript tests
        run: npm test

      - name: hassfest (Home Assistant integration validator)
        uses: home-assistant/actions/hassfest@master

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
