name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lint and validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install uv
        run: pip install uv

      - name: Install Node.js dependencies
        run: npm ci

      - name: Validate manifest.json and hacs.json
        run: |
          python -c "import json; json.load(open('custom_components/sims2ha/manifest.json'))"
          python -c "import json; json.load(open('hacs.json'))"

      - name: Compile Python (integration)
        run: python -m py_compile custom_components/sims2ha/*.py

      - name: Check JavaScript syntax
        run: |
          for f in src/*.js; do node --check "$f"; done
          node --check custom_components/sims2ha/frontend/sims2-bundle.js

      - name: Lint JavaScript
        run: npm run lint

      - name: Lint Python (ruff check)
        run: uv run ruff check .

      - name: Format check Python (ruff format)
        run: uv run ruff format --check .

      - name: Run Python tests
        run: |
          if ls tests/*.py &>/dev/null; then
            uv run pytest
          else
            echo "No Python test files found, skipping pytest"
          fi

      - name: Run JavaScript tests
        run: npm test

      - name: hassfest (Home Assistant integration validator)
        uses: home-assistant/actions/hassfest@master

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
