name: PR Preview

# Render all Sims 2 custom Lovelace cards and embed screenshots on every
# pull-request push so reviewers can see the UI changes without merging.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    name: Card screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright Chromium
        run: |
          npm init -y --silent >/dev/null 2>&1
          npm install playwright
          npx playwright install chromium
          # Install system deps that Playwright needs for headless rendering.
          npx playwright install-deps chromium

      - name: Build bundle
        run: ./build.sh

      - name: Render cards
        run: node scripts/render-cards.js

      - name: Upload screenshots as release asset
        run: |
          gh release upload "${{ github.ref_name }}" artifacts/cards/*.png --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Comment PR with embedded images
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.ref_name }}
        run: |
          BASE_URL="https://github.com/n00b001/sims2ha/releases/download/${BRANCH}"
          gh pr comment ${{ github.event.pull_request.number }} -f - <<EOF
          ## Sims 2 Card Preview

          Screenshots of all custom cards rendered from this PR:

          ### All Cards Overview — plumbob, loading screen, divider, gauge, panel
          ![All Cards Overview]($BASE_URL/all-cards-overview.png)

          ### Gauge Detail — green / yellow / red severity states
          ![Gauge Detail]($BASE_URL/gauge-detail.png)

          ### Panel Detail — green / yellow / red mood colouring
          ![Panel Detail]($BASE_URL/panel-detail.png)
          EOF
