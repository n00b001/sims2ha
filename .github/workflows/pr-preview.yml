name: PR Preview

# Render all Sims 2 custom Lovelace cards and upload screenshots on every
# pull-request push so reviewers can see the UI changes without merging.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    name: Card screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright Chromium
        run: |
          npm init -y --silent >/dev/null 2>&1
          npm install playwright
          npx playwright install chromium
          # Install system deps that Playwright needs for headless rendering.
          npx playwright install-deps chromium

      - name: Build bundle
        run: ./build.sh

      - name: Render cards
        run: node scripts/render-cards.js

      - name: Checkout the feature branch (not PR merge commit)
        run: git fetch origin feat/sims2-theme-deepen && git checkout feat/sims2-theme-deepen

      - name: Commit and push screenshots
        run: |
          git -c user.name="github-actions" \
              -c user.email="github-actions@github.com" \
              add artifacts/cards/*.png
          git -c user.name="github-actions" \
              -c user.email="github-actions@github.com" \
              commit -m "Add card preview screenshots [skip ci]" || echo "No new screenshots to commit"
          git push origin feat/sims2-theme-deepen
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Comment PR with embedded images
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE_URL="https://raw.githubusercontent.com/n00b001/sims2ha/feat/sims2-theme-deepen/artifacts/cards"
          gh pr comment ${{ github.event.pull_request.number }} -b "## Sims 2 Card Preview

          Screenshots of all custom cards rendered from this PR:

          ### All Cards Overview — plumbob, loading screen, divider, gauge, panel
          ![All Cards Overview]($BASE_URL/all-cards-overview.png)

          ### Gauge Detail — green / yellow / red severity states
          ![Gauge Detail]($BASE_URL/gauge-detail.png)

          ### Panel Detail — green / yellow / red mood colouring
          ![Panel Detail]($BASE_URL/panel-detail.png)"
