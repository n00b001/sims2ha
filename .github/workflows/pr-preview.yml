name: PR Preview

# Screenshot rendering and PR commenting is now handled by the local
# pre-push hook (.git/hooks/pre-push). This workflow only runs linting.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  preview:
    name: Lint and validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install HACS action
        run: pip install hacs-backend-linter

      - name: Validate manifest.json and hacs.json
        run: hassfest --config .

      - name: Compile Python (integration)
        run: |
          python -m compileall custom_components/sims2ha

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JavaScript syntax (panel)
        run: node -c src/sims2-panel-card.js

      - name: Check JavaScript syntax (gauge)
        run: node -c src/sims2-gauge-card.js

      - name: Check JavaScript syntax (divider)
        run: node -c src/sims2-divider-card.js

      - name: hassfest (Home Assistant integration validator)
        uses: home-assistant/actions/hassfest@master

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
