# =============================================================================
#  Household Needs - a joke dashboard.
#  Every Sim has eight needs. Here they hover over your home as plumbobs.
#
#  Static by default so there are no placeholder entities to 404. Wire any need
#  to a real sensor by adding `entity:` plus `green_above:`/`yellow_above:` (or
#  a `state_map:`) to that plumbob card; it then colours itself from the value.
# =============================================================================
title: Household Needs
views:
  - title: Needs
    path: needs
    icon: sims2:need-energy
    cards:
      - type: markdown
        content: >
          # 🧠 Household Needs


          > Your home is basically a Sim. It has needs. Keep the plumbobs green
          > and the neighbourhood prospers.


          Each need below is a plumbob. Add an `entity:` to one to make it live.

      - type: custom:sims2-plumbob
        title: Overall Plumbob
        subtitle: How is the household, really
        mood: green
        size: 90

      - type: grid
        columns: 4
        square: false
        cards:
          - type: custom:sims2-plumbob
            title: Hunger
            mood: green
            size: 54
          - type: custom:sims2-plumbob
            title: Energy
            mood: green
            size: 54
          - type: custom:sims2-plumbob
            title: Comfort
            mood: green
            size: 54
          - type: custom:sims2-plumbob
            title: Fun
            mood: green
            size: 54
          - type: custom:sims2-plumbob
            title: Social
            mood: green
            size: 54
          - type: custom:sims2-plumbob
            title: Hygiene
            mood: green
            size: 54
          - type: custom:sims2-plumbob
            title: Bladder
            mood: green
            size: 54
          - type: custom:sims2-plumbob
            title: Room
            mood: green
            size: 54

      - type: markdown
        content: >
          ### The free will problem


          Sims left to their own devices will eventually set the kitchen on
          fire. Your home, given the right automations, is hopefully smarter
          than that. Keep the plumbobs green and nobody gets burned.
