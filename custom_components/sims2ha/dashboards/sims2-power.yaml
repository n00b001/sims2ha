# =============================================================================
#  Reticulating Splines - Power & Energy.
#  Every watt is a simoleon. This dashboard tallies them up with gauges and
#  meters drawn straight from your power and energy sensors.
#
#  Uses the bundled auto-entities card (no separate HACS install needed).
# =============================================================================
title: Power & Energy
views:
  - title: Power
    path: power
    icon: sims2:type-electronics
    cards:
      - type: markdown
        content: >
          # Reticulating Splines: Power & Energy


          > Every watt is a simoleon. We are counting all of them.

      # --- Live power draw as gauges ---------------------------------------
      - type: custom:auto-entities
        card:
          type: grid
          columns: 2
          square: false
        filter:
          include:
            - domain: sensor
              device_class: power
              options:
                type: gauge
                name: '{{ states(entity) }} W'
                min: 0
                max: 10000
                severity:
                  green: 2000
                  yellow: 5000
                  red: 8000
        sort:
          method: name
        show_empty: true

      # --- Energy meters ----------------------------------------------------
      - type: custom:auto-entities
        card:
          type: entities
          title: Simoleons spent (energy meters)
          state_color: true
        filter:
          include:
            - domain: sensor
              device_class: energy
        sort:
          method: name
        show_empty: true

      # --- Battery levels ---------------------------------------------------
      - type: custom:auto-entities
        card:
          type: entities
          title: Batteries (the things that always need charging)
          state_color: true
        filter:
          include:
            - domain: sensor
              device_class: battery
        sort:
          method: name
        show_empty: true

      - type: markdown
        content: >
          ### Energy-saving tip


          Turning off a light you are not using reticulates zero splines,
          saves simoleons, and mildly pleases the plumbob.
