# =============================================================================
#  Pleasantview Starter - a simple landing view.
#  Uses the bundled auto-entities (no separate install needed) to pull in a few
#  of your lights, switches, climate and media players automatically. The
#  loading splash and the plumbob mascot work on their own.
# =============================================================================
title: Pleasantview Starter
views:
  - title: Home
    path: home
    icon: sims2:aspiration-star
    cards:
      - type: custom:sims2-loading
        wordmark: PLEASANTVIEW
        duration: 4
        fullscreen: true

      - type: markdown
        content: >
          #  Welcome to Pleasantview


          A starter dashboard for the Sims 2 theme. The favourites below fill
          in automatically from your own entities.

      - type: custom:sims2-plumbob
        title: Household Morale
        mood: green
        size: 76

      - type: custom:auto-entities
        card:
          type: entities
          title: A few favourites
          state_color: true
        filter:
          include:
            - domain: light
            - domain: switch
            - domain: climate
            - domain: media_player
        sort:
          method: domain
        show_empty: false

      - type: markdown
        content: >
          ### Add more


          Every dashboard in this collection auto-populates from your entities
          - lights, locks, sensors and more, jokes included.
