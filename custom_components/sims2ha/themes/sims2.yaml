# =============================================================================
#  Sims 2 - a Home Assistant theme
#  A fan-made tribute to the The Sims 2 user interface. Not affiliated with
#  Electronic Arts. Palette and rationale documented in docs/PALETTE.md.
#
#  BLUE-DOMINANT palette: deep-navy skies, sky-blue panel cards, gold trim,
#  and a bright plumbob green for "active"/"on" states. No parchment/cream
#  surfaces -- the game UI is navy + sky-blue, not parchment.
#
#  Typography: Benguiat Gothic is the ONLY font, baked into the frontend
#  bundle as a base64 @font-face and wired here via --sims2-font-* tokens.
#
#  Installs one selectable theme:
#    sims2        - The Sims 2 dark theme (midnight navy, muted-blue panels, cream text)
#
#  Variable coverage is verified by scripts/audit_theme_variables.py against
#  docs/HA_THEMING_CAPABILITIES.md. PLAN.md section 2 is the source of truth
#  for every value below.
# =============================================================================

