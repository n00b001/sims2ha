repos:
  - repo: https://github.com/prettier/prettier
    rev: v3.3.2
    hooks:
      - id: prettier
        files: \.(js|ts|css|html|md|json|yaml|yml)$
        options: --write
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.4.2
    hooks:
      - id: ruff
        args: [--fix]
        files: \.(py)$