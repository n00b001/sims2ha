<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gauge Detail</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #e8e0d0;
      font-family: "Fredoka", system-ui, sans-serif;
      color: #3A2E1E;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      margin: 0 0 20px 0;
      color: #5A4A2E;
      letter-spacing: 0.04em;
    }
    .card-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      margin-bottom: 28px;
    }
    .card-snapshot {
      background: #fff;
      border-radius: 16px;
      padding: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    ha-card {
      display: block !important;
    }
  </style>
</head>
<body>
  <h1>Gauge Detail</h1>
  <div class="card-row"><div class="card-snapshot" id="gauge-low"></div>
        <div class="card-snapshot" id="gauge-mid"></div>
        <div class="card-snapshot" id="gauge-high"></div></div>
  <script src="sims2-bundle.js"></script>
  <script>
    // Wait for bundle to register all custom elements, then instantiate cards.
    window.addEventListener("load", () => {
      const waitMs = 800;
      setTimeout(() => {
        
          (function () {
            const container = document.getElementById("gauge-low");
            if (!container) return;

            // Create card element (registered as e.g. "sims2-plumbob", not "custom:sims2-plumbob")
            const card = document.createElement("sims2-gauge");
            card.setAttribute("type", "custom:sims2-gauge");
            card.setConfig({"entity":"sensor.main_power_draw","name":"Low Power","unit":" W","min":0,"max":10000,"severity":{"green":2000,"yellow":5000,"red":8000}});
            container.appendChild(card);

            // Provide Home Assistant context (null for cards that don't need it)
            if (true) {
              card.hass = {"states":{"sensor.main_power_draw":{"state":"500"}}};
            }
          })();
          (function () {
            const container = document.getElementById("gauge-mid");
            if (!container) return;

            // Create card element (registered as e.g. "sims2-plumbob", not "custom:sims2-plumbob")
            const card = document.createElement("sims2-gauge");
            card.setAttribute("type", "custom:sims2-gauge");
            card.setConfig({"entity":"sensor.main_power_draw","name":"Mid Power","unit":" W","min":0,"max":10000,"severity":{"green":2000,"yellow":5000,"red":8000}});
            container.appendChild(card);

            // Provide Home Assistant context (null for cards that don't need it)
            if (true) {
              card.hass = {"states":{"sensor.main_power_draw":{"state":"4500"}}};
            }
          })();
          (function () {
            const container = document.getElementById("gauge-high");
            if (!container) return;

            // Create card element (registered as e.g. "sims2-plumbob", not "custom:sims2-plumbob")
            const card = document.createElement("sims2-gauge");
            card.setAttribute("type", "custom:sims2-gauge");
            card.setConfig({"entity":"sensor.main_power_draw","name":"High Power","unit":" W","min":0,"max":10000,"severity":{"green":2000,"yellow":5000,"red":8000}});
            container.appendChild(card);

            // Provide Home Assistant context (null for cards that don't need it)
            if (true) {
              card.hass = {"states":{"sensor.main_power_draw":{"state":"9200"}}};
            }
          })();
      }, waitMs);
    });
  </script>
</body>
</html>
