<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Panel Detail</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #e8e0d0;
      font-family: "Fredoka", system-ui, sans-serif;
      color: #3A2E1E;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      margin: 0 0 20px 0;
      color: #5A4A2E;
      letter-spacing: 0.04em;
    }
    .card-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      margin-bottom: 28px;
    }
    .card-snapshot {
      background: #fff;
      border-radius: 16px;
      padding: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    ha-card {
      display: block !important;
    }
  </style>
</head>
<body>
  <h1>Panel Detail</h1>
  <div class="card-row"><div class="card-snapshot" id="panel-green"></div>
        <div class="card-snapshot" id="panel-yellow"></div>
        <div class="card-snapshot" id="panel-red"></div></div>
  <script src="sims2-bundle.js"></script>
  <script>
    // Wait for bundle to register all custom elements, then instantiate cards.
    window.addEventListener("load", () => {
      const waitMs = 800;
      setTimeout(() => {
        
          (function () {
            const container = document.getElementById("panel-green");
            if (!container) return;

            // Create card element (registered as e.g. "sims2-plumbob", not "custom:sims2-plumbob")
            const card = document.createElement("sims2-panel");
            card.setAttribute("type", "custom:sims2-panel");
            card.setConfig({"title":"Living Room","icon":"sims2:cheerful","entity":"climate.living_room","green_above":70,"yellow_above":33,"children":[{"title":"Thermostat","type":"entities","entities":["climate.living_room"]},{"title":"Lights","type":"entities","entities":["light.lamp"]}]});
            container.appendChild(card);

            // Provide Home Assistant context (null for cards that don't need it)
            if (true) {
              card.hass = {"states":{"sensor.living_room_temperature":{"state":"22"},"sensor.main_power_draw":{"state":"3500"},"sensor.battery_level":{"state":"78"},"climate.living_room":{"state":"heat"},"light.lamp":{"state":"on"}}};
            }
          })();
          (function () {
            const container = document.getElementById("panel-yellow");
            if (!container) return;

            // Create card element (registered as e.g. "sims2-plumbob", not "custom:sims2-plumbob")
            const card = document.createElement("sims2-panel");
            card.setAttribute("type", "custom:sims2-panel");
            card.setConfig({"title":"Kitchen","icon":"sims2:hungry","entity":"sensor.kitchen_temperature","green_above":70,"yellow_above":33,"children":[{"title":"Fridge","type":"entities","entities":["sensor.kitchen_temperature"]}]});
            container.appendChild(card);

            // Provide Home Assistant context (null for cards that don't need it)
            if (true) {
              card.hass = {"states":{"sensor.kitchen_temperature":{"state":"45"},"climate.living_room":{"state":"cooling"},"light.lamp":{"state":"on"}}};
            }
          })();
          (function () {
            const container = document.getElementById("panel-red");
            if (!container) return;

            // Create card element (registered as e.g. "sims2-plumbob", not "custom:sims2-plumbob")
            const card = document.createElement("sims2-panel");
            card.setAttribute("type", "custom:sims2-panel");
            card.setConfig({"title":"Security","icon":"sims2:security","entity":"sensor.front_door","green_above":70,"yellow_above":33,"children":[{"title":"Front Door","type":"entities","entities":["sensor.front_door"]}]});
            container.appendChild(card);

            // Provide Home Assistant context (null for cards that don't need it)
            if (true) {
              card.hass = {"states":{"sensor.front_door":{"state":"unavailable"},"climate.living_room":{"state":"off"},"light.lamp":{"state":"off"}}};
            }
          })();
      }, waitMs);
    });
  </script>
</body>
</html>
