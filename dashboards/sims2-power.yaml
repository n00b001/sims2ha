# =============================================================================
#  Reticulating Splines - Power & Energy.
#  Every watt is a simoleon. This dashboard tallies them up with gauges and
#  meters drawn straight from your power and energy sensors.
#
#  Requires the optional auto-entities integration (HACS).
# =============================================================================
title: Power & Energy
views:
  - title: Power
    path: power
    icon: mdi:flash
    cards:
      - type: markdown
        content: >
          # ⚡ Reticulating Splines: Power & Energy


          > Every watt is a simoleon. We are counting all of them.

      # --- Live power draw as gauges ---------------------------------------
      - type: custom:auto-entities
        card:
          type: grid
          columns: 2
          square: false
        filter:
          include:
            - domain: sensor
              device_class: power
              options:
                type: gauge
        sort:
          method: name
        show_empty: true

      # --- Energy meters ----------------------------------------------------
      - type: custom:auto-entities
        card:
          type: entities
          title: Simoleons spent (energy meters)
          state_color: true
        filter:
          include:
            - domain: sensor
              device_class: energy
        sort:
          method: name
        show_empty: true

      # --- Battery levels ---------------------------------------------------
      - type: custom:auto-entities
        card:
          type: entities
          title: Batteries (the things that always need charging)
          state_color: true
        filter:
          include:
            - domain: sensor
              device_class: battery
            - domain: sensor
              device_class: battery_charging
        sort:
          method: name
        show_empty: true

      - type: markdown
        content: >
          ### Energy-saving tip


          Turning off a light you are not using reticulates zero splines,
          saves simoleons, and mildly pleases the plumbob.
